<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Master</title>
    <link rel="stylesheet" href="css.css">
</head>
<body background="download (1).jpg">

    <div class="game-container">
        <header>
            <h1>Grammar<h5>by:Keyzia Floriana Manullang</h5></h1><br>
            <div class="score-board">Score: <span id="score">0</span></div>
        </header>

        <div id="start-screen" class="start-screen">
            <div class="hero-image" aria-hidden="true"></div>
            <h2>Welcome!</h2>
            <p>Please enter your name first to start the grammar quiz.</p>
            <input type="text" id="player-name" placeholder="Your name..." autocomplete="off" />
            <button id="start-btn" class="start-btn">Start</button>
        </div>

        <h2 id="welcome-message" class="welcome-message hidden"></h2>

        <div id="quiz-box" class="hidden">
            <div class="question-area">
                <p id="question">Loading question...</p>
            </div>
            
            <div class="options-container">
                <button class="option-btn" onclick="checkAnswer(0)"></button>
                <button class="option-btn" onclick="checkAnswer(1)"></button>
                <button class="option-btn" onclick="checkAnswer(2)"></button>
                <button class="option-btn" onclick="checkAnswer(3)"></button>
            </div>
        </div>
        
        <div id="result-screen" class="hidden">
            <h2>Game Over!</h2>
            <p>Your Final Score: <span id="final-score">0</span></p>
            <p id="score-message">Don't be discouraged, keep learning!</p>
            <button onclick="resetGame()" class="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
